openapi: 3.1.0
info:
  title: SuiteManager Public API for ChatGPT
  version: 1.4.6
  description: |
    API pública para Actions. Listados usan **producto_ia_v2**: precio por tarifas PG, ubicación, amenidades
    (metadata + inventario componentes), políticas mergeadas (empresa + propiedad), alias `precioBase`/`ciudad`/`direccion_corta`.
    Tras listar, llamar **obtenerDetalleAlojamiento** para ficha completa (galería, inventario_verificado, normas).

    **v1.3:** capa comercial en JSON: `contexto_turistico` (tipo_viaje, entorno, destacados, sugerencia_copy),
    `amenidades_publicas` (venta), `inventario_detallado` (strings), `descripcion_fuente` (`meta_o_columna` | `auto_template`),
    galería con `espacio` y `tipo_ia`, ubicación ampliada desde website/buildContext cuando exista.

    **v1.4:** `GET /api/alojamientos/detalle` acepta `checkin` + `checkout` (YYYY-MM-DD, aliases `fechaLlegada`/`fechaSalida`) y opcional `adultos`;
    si vienen fechas válidas, la respuesta incluye `precio_estimado` (misma función `publicWebsiteService.calculatePrice` que `/propiedad/:id/calcular-precio` + desglose checkout referencial).

    **v1.4.1:** `POST /api/reservas/cotizar` — cotización dry-run alineada a `POST /api/reservas` (validaciones, calendario, precio, desglose y política de cancelación; no persiste). Equivalente bajo `POST /api/public/reservas/cotizar` con los mismos headers que crear reserva.

    **v1.4.2:** Path explícito `POST /api/public/reservas/cotizar` documentado en OpenAPI (mismo cuerpo y respuesta que `/api/reservas/cotizar`; cabeceras de agente y rate limit alineados a `POST /api/public/reservas`).

    **v1.4.3:** `GET /api/alojamientos/detalle` incluye `booking_workflow` (disponibilidad, detalle con fechas, dry-run cotizar, cuerpo ejemplo reserva) con `empresa_id` y `alojamiento_id` ya resueltos.

    **v1.4.4:** `GET /api/disponibilidad` documenta `endpoints` (galería, detalle, `cotizar_reserva_dry_run`) y `requiere_confirmacion_reserva`.

    **v1.4.5:** nuevo `POST /api/reservas/resolve-booking-unit` (y espejo `/api/public/reservas/resolve-booking-unit`) para traducir `catalog_id` de catálogo hacia `booking_id` transaccional previo a reservar.
    **v1.4.6:** `/ai/buscar-empresa` prioriza empresas listas para venta (`ready_for_sales`: canal por defecto + tarifas > 0) y devuelve diagnóstico resumido de tarifas.

servers:
  - url: https://suite-manager.onrender.com

paths:

  /ai/buscar-empresa:
    get:
      operationId: buscarEmpresa
      summary: Busca empresas por nombre y devuelve instrucciones del agente interno.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resultados
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  empresaId: { type: string, nullable: true }
                  nombre: { type: string }
                  ready_for_sales: { type: boolean }
                  diagnostico_tarifas:
                    type: object
                    nullable: true
                    properties:
                      canal_por_defecto_configurado: { type: boolean }
                      tarifas_totales: { type: integer }
                  agentContent: { type: string }

  /ai/busqueda-general:
    get:
      operationId: busquedaGeneralAi
      summary: Búsqueda global en PostgreSQL (mismo enriquecimiento que listado público v2).
      description: |
        Devuelve `resultados[]` con **producto_ia_v2**. Query `compact=0` o `compact=full` amplía descripción y amenidades.
        Opcional **`vibe`** o **`vibes`**: lista separada por coma o `+` (ej. `tinaja,naturaleza,wifi`) filtra por texto en amenidades públicas, entorno turístico y nombre.
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: destino
          schema: { type: string }
        - in: query
          name: checkin
          schema: { type: string, format: date }
        - in: query
          name: checkout
          schema: { type: string, format: date }
        - in: query
          name: personas
          schema: { type: integer }
        - in: query
          name: adultos
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, default: 15, maximum: 20 }
        - in: query
          name: compact
          description: "0 o full = payload menos recortado (más texto y amenidades)."
          schema: { type: string, default: "1" }
        - in: query
          name: vibe
          description: Filtro semántico (coma o +); alias `vibes`.
          schema: { type: string }
      responses:
        "200":
          description: Lista enriquecida (producto_ia_v2)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusquedaGeneralAiResponse"

  /api/public/busqueda-general:
    get:
      operationId: busquedaGeneralPublic
      summary: Busca alojamientos listados en web (isListed); respuesta envuelta por meta de verificación.
      description: |
        Cuerpo JSON: envoltorio `{ meta, data }` donde `data` es objeto `{ meta, data[] }`.
        Cada elemento de `data.data` es **ProductoIaListingCard** (producto_ia_v2).
        Parámetros útiles: `ubicacion`, `capacidad`, `fechaLlegada`/`fechaSalida` o `checkin`/`checkout`,
        `amenidades` (coma), `ordenar` (popularidad|precio_asc|precio_desc|rating), `limit`, `offset`, `compact=0`.
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: ubicacion
          schema: { type: string }
        - in: query
          name: checkin
          schema: { type: string }
        - in: query
          name: checkout
          schema: { type: string }
        - in: query
          name: fechaLlegada
          schema: { type: string }
        - in: query
          name: fechaSalida
          schema: { type: string }
        - in: query
          name: personas
          schema: { type: integer }
        - in: query
          name: capacidad
          schema: { type: integer }
        - in: query
          name: amenidades
          schema: { type: string }
        - in: query
          name: ordenar
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
        - in: query
          name: compact
          schema: { type: string }
        - in: query
          name: empresaId
          schema: { type: string }
      responses:
        "200":
          description: Envelope + listado v2
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAiBusquedaEnvelope"

  /api/agent-config:
    get:
      operationId: obtenerConfigAgente
      summary: Instrucciones personalizadas del agente para una empresa.
      parameters:
        - in: query
          name: empresa_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Configuración del agente
          content:
            application/json:
              schema:
                type: object
                properties:
                  empresa_id: { type: string }
                  nombre_empresa: { type: string }
                  instrucciones: { type: string }
                  manifiesto: { type: object }

  /api/disponibilidad:
    get:
      operationId: consultarDisponibilidad
      summary: Disponibilidad enriquecida por empresa (fotos reales, precio total por estadía, restricciones y motivos).
      description: |
        Incluye `consulta_valida` y `motivo_consulta` si las fechas violan mínimo de noches, anticipación, etc.
        Cada alojamiento trae `foto_url`, `fotos_preview` (galería PG), `precio_total_estadia_clp` si está libre y hay tarifas,
        y `motivo_no_disponible` si está ocupado, bloqueado o sin tarifa en el rango.
        `empresa.is_demo_heuristica` es heurística por nombre/subdominio (no reemplaza política de negocio).
        Usar `GET /api/alojamientos/imagenes` para galería completa.
      parameters:
        - in: query
          name: empresa_id
          schema: { type: string }
        - in: query
          name: checkin
          required: true
          schema: { type: string }
        - in: query
          name: checkout
          required: true
          schema: { type: string }
        - in: query
          name: adultos
          schema: { type: integer }
      responses:
        "200":
          description: Payload `disponibilidad_ia_v1` (consulta_valida, reglas_estadia, empresa, alojamientos enriquecidos).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  payload_version: { type: string, example: disponibilidad_ia_v1 }
                  consulta_valida: { type: boolean }
                  motivo_consulta: { type: object, nullable: true }
                  reglas_estadia: { type: object, nullable: true }
                  empresa: { type: object }
                  disponibles: { type: integer }
                  total: { type: integer }
                  alojamientos:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        nombre: { type: string }
                        nombre_comercial: { type: string, nullable: true }
                        disponible: { type: boolean }
                        capacidad: { type: integer }
                        foto_url: { type: string, nullable: true }
                        fotos_preview: { type: array, nullable: true }
                        precio_total_estadia_clp: { type: integer, nullable: true }
                        motivo_no_disponible: { type: object, nullable: true }
                  requiere_confirmacion_reserva: { type: boolean }
                  endpoints:
                    type: object
                    description: Atajos de URL documentados para el agente.
                    properties:
                      galeria: { type: string }
                      detalle: { type: string }
                      cotizar_reserva_dry_run: { type: string }

  /api/alojamientos/detalle:
    get:
      operationId: obtenerDetalleAlojamiento
      summary: Ficha comercial completa (descripción, precio, ubicación, amenidades, normas, galería, reseñas).
      description: |
        Usar **siempre** tras elegir un alojamiento para preguntas de parrilla, mascotas, camas, wifi, etc.
        `precio.origen` indica si el monto vino de metadata o de tarifas PG.
        Con **checkin** y **checkout** (YYYY-MM-DD) se añade `precio_estimado` por estadía (disponibilidad + tarifas canal por defecto).
        Siempre incluye **booking_workflow** con URLs y cuerpos de ejemplo (paso_2b = dry-run `POST …/reservas/cotizar`).
      parameters:
        - in: query
          name: alojamiento_id
          required: true
          schema:
            type: string
            description: UUID de propiedad en PostgreSQL
        - in: query
          name: checkin
          schema: { type: string, format: date }
          description: Check-in (YYYY-MM-DD). Alias fechaLlegada, fechaInicio, check_in.
        - in: query
          name: checkout
          schema: { type: string, format: date }
          description: Check-out exclusivo (YYYY-MM-DD). Alias fechaSalida, fechaFin, check_out.
        - in: query
          name: adultos
          schema: { type: integer, minimum: 1, default: 2 }
          description: Huéspedes para líneas extra por persona (opcional). Alias personas.
      responses:
        "200":
          description: ProductoIaDetalle (producto_ia_v2)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductoIaDetalle"
        "404":
          description: Alojamiento no encontrado

  /api/alojamientos/imagenes:
    get:
      operationId: obtenerImagenesAlojamiento
      summary: Galería activa (estados auto/manual), orden y rol principal.
      parameters:
        - in: query
          name: alojamiento_id
          required: true
          schema: { type: string }
        - in: query
          name: empresa_id
          schema: { type: string }
      responses:
        "200":
          description: Lista plana de fotos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  total: { type: integer }
                  fotos:
                    type: array
                    items:
                      type: object
                      properties:
                        url: { type: string }
                        descripcion: { type: string }
                        tipo: { type: string }
                        orden: { type: integer }

  /api/alojamientos/alternativas:
    get:
      operationId: obtenerAlternativas
      summary: Sugiere alojamientos alternativos
      parameters:
        - in: query
          name: destino
          required: true
          schema: { type: string }
        - in: query
          name: checkin
          required: true
          schema: { type: string }
        - in: query
          name: checkout
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  alojamientos:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        nombre: { type: string }
                        capacidad: { type: integer }
                        empresa_id: { type: string }

  /api/reservas/resolve-booking-unit:
    post:
      operationId: resolveBookingUnit
      summary: Traduce catalog_id visible a booking_id transaccional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                empresa_id: { type: string }
                catalog_id: { type: string }
                checkin: { type: string }
                checkout: { type: string }
                personas: { type: integer }
      responses:
        "200":
          description: booking_id resuelto y disponibilidad para el rango.
        "404":
          description: No se encontró unidad reservable para catalog_id en la empresa.
        "422":
          description: Capacidad insuficiente o fechas inválidas.

  /api/public/reservas/resolve-booking-unit:
    post:
      operationId: resolveBookingUnitPublic
      summary: Igual que /api/reservas/resolve-booking-unit bajo /api/public (con cabeceras de agente).
      parameters:
        - in: header
          name: X-Agent-API-Key
          required: false
          schema: { type: string }
        - in: header
          name: X-Agent-Name
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                empresa_id: { type: string }
                catalog_id: { type: string }
                checkin: { type: string }
                checkout: { type: string }
                personas: { type: integer }
      responses:
        "200":
          description: booking_id resuelto y disponibilidad para el rango.
        "403":
          description: Clave de agente inválida si AGENT_API_KEYS está activo.
        "404":
          description: No se encontró unidad reservable para catalog_id en la empresa.
        "422":
          description: Capacidad insuficiente o fechas inválidas.

  /api/reservas/cotizar:
    post:
      operationId: cotizarReserva
      summary: >-
        Cotización previa (dry-run): mismas validaciones y precio que crear reserva, sin persistir reserva ni cliente.
        Incluye desglose de checkout y aviso de política de cancelación cuando aplica.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                empresa_id: { type: string }
                alojamiento_id: { type: string }
                checkin: { type: string }
                checkout: { type: string }
                adultos: { type: integer }
                ninos: { type: integer }
                origen:
                  type: string
                  default: chatgpt
                huesped:
                  type: object
                  properties:
                    nombre: { type: string }
                    apellido: { type: string }
                    email: { type: string }
                    telefono: { type: string }
      responses:
        "200":
          description: >-
            Cotización calculada (cotizacion_ok true/false) o error de validación en cuerpo JSON.
            Si cotizacion_ok es false, revisar motivo (restricciones web, fechas, capacidad, solapamiento, etc.).
        "400":
          description: PostgreSQL requerido o empresa no resuelta
        "503":
          description: Servicio no disponible (p. ej. sin base de datos)

  /api/public/reservas/cotizar:
    post:
      operationId: cotizarReservaPublic
      summary: >-
        Misma cotización dry-run que `POST /api/reservas/cotizar`, expuesta bajo `/api/public` con los mismos
        middlewares que crear reserva (`POST /api/public/reservas`): rate limit y `X-Agent-API-Key` si el servidor tiene `AGENT_API_KEYS`.
      parameters:
        - in: header
          name: X-Agent-API-Key
          required: false
          schema: { type: string }
          description: Si `AGENT_API_KEYS` está definido, debe coincidir con una clave válida (misma regla que crear reserva).
        - in: header
          name: X-Agent-Name
          required: false
          schema: { type: string }
          description: Nombre del agente (p. ej. ChatGPT); opcional.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                empresa_id: { type: string }
                alojamiento_id: { type: string }
                checkin: { type: string }
                checkout: { type: string }
                adultos: { type: integer }
                ninos: { type: integer }
                origen:
                  type: string
                  default: chatgpt
                huesped:
                  type: object
                  properties:
                    nombre: { type: string }
                    apellido: { type: string }
                    email: { type: string }
                    telefono: { type: string }
      responses:
        "200":
          description: Igual que `POST /api/reservas/cotizar` (cotizacion_ok y cuerpo alineado).
        "400":
          description: Validación o PostgreSQL requerido según cuerpo
        "403":
          description: Clave de agente inválida si el servidor exige `AGENT_API_KEYS`
        "503":
          description: Servicio no disponible (p. ej. sin base de datos)

  /api/reservas:
    post:
      operationId: crearReserva
      summary: Crea una reserva (requiere cabeceras de agente si AGENT_API_KEYS está configurado).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                empresa_id: { type: string }
                alojamiento_id: { type: string }
                checkin: { type: string }
                checkout: { type: string }
                adultos: { type: integer }
                ninos: { type: integer }
                origen:
                  type: string
                  default: chatgpt
                huesped:
                  type: object
                  properties:
                    nombre: { type: string }
                    apellido: { type: string }
                    email: { type: string }
                    telefono: { type: string }
      responses:
        "201":
          description: Reserva creada
        "400":
          description: Campos faltantes
        "409":
          description: No disponible

components:
  schemas:
    ProductoIaUbicacion:
      type: object
      description: >-
        Primero metadata de la propiedad (Google Hotel, websiteData, buildContext, ubicacion);
        si siguen vacíos, se completan ciudad/región/geo desde configuración de empresa (panel).
      properties:
        direccion: { type: string }
        ciudad: { type: string }
        region: { type: string }
        pais: { type: string, nullable: true }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        direccion_linea: { type: string }

    ProductoIaPrecioPorEstadia:
      type: object
      description: Presente en detalle con checkin/checkout y cotización OK (resumen; el desglose completo sigue en precio_estimado).
      properties:
        checkin: { type: string }
        checkout: { type: string }
        noches: { type: integer }
        moneda: { type: string }
        total_estadia_clp: { type: integer, nullable: true }
        promedio_noche_clp: { type: integer, nullable: true }
        extras_estimados_clp: { type: integer, nullable: true }
        lineas_extra_preview:
          type: array
          nullable: true
          items:
            type: object
            properties:
              etiqueta: { type: string }
              monto_clp: { type: integer }
              es_extra: { type: boolean }
        modelo_checkout: { type: string, nullable: true }
        iva_desglosado_clp: { type: integer, nullable: true }
        neto_desglosado_clp: { type: integer, nullable: true }

    ProductoIaSenalesRanking:
      type: object
      properties:
        senales:
          type: array
          items: { type: string }
          description: >-
            Claves determinísticas (p. ej. bien_valorada, orientada_familias, bien_equipada, relax_tinaja).
            No incluye “más reservada” sin métrica de reservas.

    ProductoIaPrecio:
      type: object
      properties:
        noche_referencia_clp: { type: integer, nullable: true }
        moneda: { type: string, example: CLP }
        origen:
          type: string
          nullable: true
          description: metadata.precioBase | tarifas.canal_por_defecto | tarifas.min_cualquier_canal
        por_estadia:
          $ref: "#/components/schemas/ProductoIaPrecioPorEstadia"
          nullable: true

    ProductoIaPoliticas:
      type: object
      nullable: true
      properties:
        mascotas: { type: boolean, nullable: true }
        fumadores: { type: boolean, nullable: true }
        mascotas_codigo: { type: string, nullable: true }
        fumar_codigo: { type: string, nullable: true }
        hora_checkin: { type: string, nullable: true }
        hora_checkout: { type: string, nullable: true }

    ProductoIaDistribucion:
      type: object
      properties:
        dormitorios: { type: integer }
        banos: { type: integer }

    ProductoIaContextoTuristico:
      type: object
      properties:
        tipo_viaje:
          type: array
          items: { type: string }
          description: Heurístico (familias, parejas, grupos).
        entorno:
          type: array
          items: { type: string }
          description: >-
            Heurístico desde textos y ubicación (metadata, dirección, ciudad): bosque, rio, lago, montaña,
            costa, ciudad, ski, termas, valle, etc.
        destacados:
          type: array
          items: { type: string }
        sugerencia_copy: { type: string, nullable: true }

    ProductoIaListingCard:
      type: object
      properties:
        id: { type: string }
        nombre: { type: string }
        capacidad: { type: integer }
        empresa:
          type: object
          properties:
            id: { type: string }
            nombre: { type: string }
        precio:
          $ref: "#/components/schemas/ProductoIaPrecio"
        ubicacion:
          $ref: "#/components/schemas/ProductoIaUbicacion"
        descripcion: { type: string, nullable: true }
        descripcion_fuente:
          type: string
          nullable: true
          description: meta_o_columna | auto_template
        amenidades:
          type: array
          items: { type: string }
        amenidades_publicas:
          type: array
          items: { type: string }
          description: Amenities normalizadas para venta (sin inventario fino de cocina).
        inventario_detallado:
          type: array
          items: { type: string }
          description: Líneas tipo "3× Plato" desde componentes verificados.
        contexto_turistico:
          $ref: "#/components/schemas/ProductoIaContextoTuristico"
        distribucion:
          $ref: "#/components/schemas/ProductoIaDistribucion"
        politicas:
          $ref: "#/components/schemas/ProductoIaPoliticas"
        resumen_normas: { type: string, nullable: true }
        foto_url: { type: string, nullable: true }
        rating: { type: number, nullable: true }
        rating_fuente:
          type: string
          nullable: true
          description: metadata.rating si existe; si no, resenas.promedio_general (mismo valor que rating).
        senales_ranking_ia:
          $ref: "#/components/schemas/ProductoIaSenalesRanking"
        listada_web: { type: boolean }
        payload_version: { type: string, example: producto_ia_v2 }
        precioBase:
          type: integer
          nullable: true
          description: Alias de precio.noche_referencia_clp (CLP) para clientes legacy.
        ciudad:
          type: string
          description: Alias de ubicacion.ciudad.
        direccion_corta:
          type: string
          description: Alias de ubicacion.direccion_linea.

    ProductoIaImagen:
      type: object
      properties:
        url: { type: string }
        thumbnail_url: { type: string, nullable: true }
        alt: { type: string }
        tipo: { type: string, description: rol galería (principal | adicional) }
        espacio: { type: string, nullable: true, description: Etiqueta de espacio (ej. Dormitorio principal) }
        tipo_ia:
          type: string
          description: Categoría conversacional (dormitorio, terraza, exterior, general, …)
        orden: { type: integer }
        principal:
          type: boolean
          description: >-
            true en la portada inferida (rol principal en galería, o misma URL que cardImage del sitio,
            o primera foto).

    ProductoIaInventarioItem:
      type: object
      properties:
        description: { type: string }
        quantity: { type: integer }
        location: { type: string }
        verified: { type: boolean }

    ProductoIaNormasBloque:
      type: object
      properties:
        titulo: { type: string }
        rows:
          type: array
          items:
            type: object
            properties:
              icon: { type: string }
              text: { type: string }

    ProductoIaPrecioEstimado:
      type: object
      description: Cotización por estadía (solo si se enviaron checkin/checkout válidos).
      properties:
        checkin: { type: string }
        checkout: { type: string }
        moneda: { type: string }
        motor:
          type: string
          example: publicWebsiteService.calculatePrice
        noches: { type: integer }
        disponible: { type: boolean, nullable: true }
        calculo_ok: { type: boolean }
        codigo:
          type: string
          nullable: true
          description: NOT_AVAILABLE | NO_PRICING | SIN_CANAL_DEFECTO | CAPACIDAD | CALC_ERROR | ERROR
        subtotal_alojamiento_clp: { type: integer, nullable: true }
        total_estadia_clp:
          type: integer
          nullable: true
          description: Alias de subtotal_alojamiento_clp (tarifas de alojamiento para las fechas).
        promedio_noche_clp: { type: integer, nullable: true }
        desglose_checkout:
          type: object
          nullable: true
        referencia:
          type: object
          nullable: true
        aviso: { type: string, nullable: true }
        mensaje: { type: string, nullable: true }

    ProductoIaDetalle:
      allOf:
        - $ref: "#/components/schemas/ProductoIaListingCard"
        - type: object
          properties:
            success: { type: boolean, example: true }
            descripcion: { type: string }
            inventario_verificado:
              type: array
              items:
                $ref: "#/components/schemas/ProductoIaInventarioItem"
            inventario_detallado:
              type: array
              items: { type: string }
              description: Misma fuente que listado; strings listos para copy comercial.
            normas:
              type: object
              properties:
                resumen_lineas:
                  type: array
                  items: { type: string }
                secciones:
                  type: array
                  items:
                    $ref: "#/components/schemas/ProductoIaNormasBloque"
            imagenes:
              type: array
              items:
                $ref: "#/components/schemas/ProductoIaImagen"
            resenas:
              type: object
              properties:
                total: { type: integer }
                promedio_general: { type: number, nullable: true }
            precio_estimado:
              $ref: "#/components/schemas/ProductoIaPrecioEstimado"
              nullable: true
            aviso_precio_estimado:
              type: object
              nullable: true
              description: Presente cuando no se enviaron checkin/checkout; indica cómo obtener cotización por estadía.
              properties:
                requiere_query:
                  type: array
                  items: { type: string }
                mensaje: { type: string }
            requiere_confirmacion_final:
              type: boolean
              description: Siempre true; mostrar total y políticas antes de POST /api/reservas.
            booking_workflow:
              type: object
              description: >-
                Flujo sugerido (PG): disponibilidad por empresa, detalle con fechas, dry-run cotización reserva
                y cuerpo ejemplo para crear reserva. Los ids empresa_id y alojamiento_id ya vienen resueltos en texto.
              properties:
                paso_1: { type: string }
                paso_resolve: { type: string }
                paso_resolve_body: { type: object }
                paso_2: { type: string }
                paso_2b: { type: string }
                paso_2b_body: { type: object }
                paso_3: { type: string }
                paso_3_body: { type: object }

    BusquedaGeneralAiResponse:
      type: object
      properties:
        success: { type: boolean }
        total: { type: integer }
        resultados:
          type: array
          items:
            $ref: "#/components/schemas/ProductoIaListingCard"
        meta:
          type: object
          properties:
            limit: { type: integer }
            compact: { type: boolean }
            payload: { type: string, example: producto_ia_v2 }
            vibe: { type: string, nullable: true }

    PublicAiListInnerMeta:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
        filtros: { type: object }
        ordenado_por: { type: string }
        source: { type: string, example: postgres }
        compact: { type: boolean }
        payload: { type: string, example: producto_ia_v2 }

    PublicAiBusquedaEnvelope:
      type: object
      properties:
        meta:
          type: object
          properties:
            generated_at: { type: string, format: date-time }
            api_version: { type: string }
            ai_verification_mode: { type: boolean }
        data:
          type: object
          properties:
            meta:
              $ref: "#/components/schemas/PublicAiListInnerMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ProductoIaListingCard"
