name: Notificar nueva tarea de OpenClaw

on:
  push:
    branches:
      - main
    paths:
      - 'TASKS/pending.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar notificación push
        run: |
          curl -s \
            -H "Title: StayManager - Nueva tarea de OpenClaw" \
            -H "Priority: high" \
            -H "Tags: clipboard" \
            -d "OpenClaw actualizó TASKS/pending.md. Abrí Claude Code y escribí: revisar tareas pendientes" \
            https://ntfy.sh/staymanager-pablo-tareas
