name: Notificar tarea completada por Antigravity

on:
  push:
    branches:
      - main
    paths:
      - 'TASKS/completed.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar notificación push
        run: |
          curl -s \
            -H "Title: StayManager - Antigravity completó tareas" \
            -H "Priority: high" \
            -H "Tags: white_check_mark" \
            -d "Antigravity actualizó TASKS/completed.md. OpenClaw puede revisar los cambios en GitHub." \
            https://ntfy.sh/staymanager-pablo-tareas
