name: Notificar tarea completada por Antigravity

on:
  push:
    branches:
      - main
    paths:
      - 'TASKS/completed.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar email de notificación
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [StayManager] Antigravity completó tareas — listo para revisión"
          to: orillasdelcoilaco@gmail.com
          from: StayManager Tasks <${{ secrets.MAIL_USERNAME }}>
          body: |
            Antigravity actualizó TASKS/completed.md — las tareas están implementadas.

            OpenClaw puede revisar los cambios en:
            https://github.com/orillasdelcoilaco/staymanager/blob/main/TASKS/completed.md

            Para ver el diff completo del último commit:
            https://github.com/orillasdelcoilaco/staymanager/commits/main
